{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link href="{% static 'mi_app/admin.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="auth-container">
    <h2 class="auth-title">Iniciar Sesión — Eclipse</h2>

    {% if messages %}
        {% for message in messages %}
            <p class="auth-message">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="django-form-p">
            {{ form.as_p }}
        </div>

        <button type="submit" class="btn-submit">
            Ingresar al Sistema
        </button>
    </form>

    <p class="auth-footer">
        ¿No tenés cuenta? <a href="{% url 'registro' %}" class="register-link">Registrate acá</a>
    </p>
</div>
{% endblock %}
