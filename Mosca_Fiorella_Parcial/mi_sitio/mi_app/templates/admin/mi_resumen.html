<div class="stats-container">
    <h3 class="stats-title">RESUMEN ESTADÍSTICO DE SOLICITUDES</h3>
    <div class="stats-grid">
        <div class="stat-card card-total">
            <span class="stat-label">Total Recibidas</span>
            <strong class="stat-number num-total">{{ totales.total }}</strong>
        </div>
        <div class="stat-card card-comercial">
            <span class="stat-label">Comerciales</span>
            <strong class="stat-number num-comercial">{{ totales.comercial }}</strong>
        </div>
        <div class="stat-card card-tecnica">
            <span class="stat-label">Técnicas</span>
            <strong class="stat-number num-tecnica">{{ totales.tecnica }}</strong>
        </div>
        <div class="stat-card card-rrhh">
            <span class="stat-label">RRHH</span>
            <strong class="stat-number num-rrhh">{{ totales.rrhh }}</strong>
        </div>
        <div class="stat-card card-general">
            <span class="stat-label">Generales</span>
            <strong class="stat-number num-general">{{ totales.general }}</strong>
        </div>
    </div>
</div>
